# Example Sentinel configuration file
# Copy this file and modify it for your specific testing needs

# Model configuration — choose your AI provider(s)
models:
  # Default model used by all agents unless overridden
  default:
    provider: ollama           # Options: ollama, google, openai, anthropic, openai-compatible
    model: llama3.3

  # Per-agent model overrides (optional)
  agents:
    recon:
      provider: google
      model: gemini-2.0-flash
    report:
      provider: openai
      model: gpt-4o

# Authentication for the target application (optional)
authentication:
  login_type: form             # Options: form, sso, api, basic
  login_url: "https://example.com/login"
  credentials:
    username: "testuser"
    password: "testpassword"
    totp_secret: "JBSWY3DPEHPK3PXP"  # Optional TOTP secret for 2FA

  # Natural language instructions for the login flow
  login_flow:
    - "Type $username into the email field"
    - "Type $password into the password field"
    - "Click the 'Sign In' button"
    - "Enter $totp in the verification code field"
    - "Click 'Verify'"

  success_condition:
    type: url                  # Options: url, cookie, element, redirect
    value: "/dashboard"

# Scoping rules (optional)
rules:
  avoid:
    - description: "Do not test the marketing site subdomain"
      type: subdomain
      url_path: "www"

    - description: "Skip logout functionality"
      type: path
      url_path: "/logout"

    - description: "No DELETE operations on user API"
      type: path
      url_path: "/api/v1/users/*"

  focus:
    - description: "Prioritize beta admin panel subdomain"
      type: subdomain
      url_path: "beta-admin"

    - description: "Focus on user profile updates"
      type: path
      url_path: "/api/v2/user-profile"

# Pipeline execution settings (optional)
# pipeline:
#   retry_preset: subscription          # 'default' or 'subscription'
#   max_concurrent_pipelines: 2         # 1-5, default: 5
